services:
  - type: web
    name: nvtulka
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: Nvtulkadata
          property: connectionString

databases:
  - name: Nvtulkadata
    plan: free
