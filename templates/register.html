<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>💠 Регистрация — NVTULKA</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .captcha-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }
        .captcha-container img {
            border-radius: 12px;
            border: 1px solid var(--border-medium);
            cursor: pointer;
            height: 50px;
            transition: all 0.2s;
        }
        .captcha-container img:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--accent-primary-glow);
        }
        .captcha-input {
            flex: 1;
            text-align: center;
            font-size: 1.1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 700;
        }
        .captcha-refresh {
            font-size: 1rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .captcha-refresh:hover {
            transform: rotate(90deg);
        }
        .captcha-error {
            color: var(--danger);
            font-size: 0.75rem;
            margin-top: 4px;
            display: none;
        }
    </style>
</head>
<body class="dark">
    <main class="container" style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding-bottom:0;">
        <div style="width:100%;max-width:400px;text-align:center;">
            <div style="font-size:4rem;margin-bottom:12px;">💠</div>
            <h1 style="font-size:2rem;font-weight:800;background:var(--gradient-neon);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;">NVTULKA</h1>
            <p style="color:var(--text-tertiary);margin-bottom:28px;">Создание аккаунта</p>

            <form method="POST" action="/register" id="registerForm" style="display:flex;flex-direction:column;gap:14px;">
                <input type="text" name="username" placeholder="Имя пользователя" required minlength="2" maxlength="50">
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Пароль" required minlength="4">

                <!-- Капча -->
                <div style="text-align:left;">
                    <label style="font-size:0.8rem;color:var(--text-secondary);">Подтвердите, что вы не бот:</label>
                    <div class="captcha-container">
                        <img src="/captcha/generate" alt="Капча" id="captchaImage" onclick="refreshCaptcha()" title="Нажмите для обновления">
                        <input type="text" class="captcha-input" id="captchaInput" placeholder="Введите код" maxlength="5" autocomplete="off">
                        <span class="captcha-refresh" onclick="refreshCaptcha()" title="Обновить">🔄</span>
                    </div>
                    <div class="captcha-error" id="captchaError">Неверный код, попробуйте ещё раз</div>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;">Зарегистрироваться 🚀</button>
            </form>

            <p style="margin-top:20px;color:var(--text-tertiary);">
                Уже есть аккаунт? <a href="/login">Войти</a>
            </p>
        </div>
    </main>

    <script>
        function refreshCaptcha() {
            const img = document.getElementById('captchaImage');
            img.src = '/captcha/generate?' + Date.now();
            document.getElementById('captchaInput').value = '';
            document.getElementById('captchaError').style.display = 'none';
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const captchaInput = document.getElementById('captchaInput').value;

            // Проверяем капчу
            const resp = await fetch('/captcha/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ captcha: captchaInput })
            });
            const data = await resp.json();

            if (!data.valid) {
                document.getElementById('captchaError').style.display = 'block';
                refreshCaptcha();
                return;
            }

            // Капча пройдена — отправляем форму
            this.submit();
        });

        // Авто-обновление капчи при загрузке
        refreshCaptcha();
    </script>
</body>
</html>
