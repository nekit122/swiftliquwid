<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>💠 Админ-панель — NVTULKA</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dark">
    <main class="container" style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding-bottom:0;">
        <div style="width:100%;max-width:400px;text-align:center;">
            <div style="font-size:4rem;margin-bottom:12px;">🔐</div>
            <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:8px;">Секретная админ-панель</h1>
            <p style="color:var(--text-tertiary);margin-bottom:24px;">Введите пароль администратора</p>

            <form method="POST" action="/admin/login" style="display:flex;flex-direction:column;gap:14px;">
                <input type="password" name="password" placeholder="Пароль" required style="text-align:center;font-size:1.2rem;letter-spacing:4px;">
                <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:1rem;">Войти 🔑</button>
            </form>
        </div>
    </main>
</body>
</html>
